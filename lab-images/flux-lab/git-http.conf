# Smart-HTTP git server for Chapter 4 (FluxCD).
#
# Serves the bare repos under /srv/repos over the SMART git HTTP protocol using
# git's own CGI (`git-http-backend`). Flux's source-controller (go-git) only
# speaks smart HTTP, so this - not a static file server - is what makes
# `flux create source git … --url=http://git-server.git-system…/cosmos-deploy.git`
# reconcile to Ready.
#
# apache runs as a host process inside the flux-lab container, listening on
# :8080; the in-cluster `git-server` Service (see git-server.yaml) forwards to
# the node IP on this port. Read-only fetch is all the lab needs (the player
# pushes to the bare repo over the local filesystem, not over HTTP), so we do
# not enable http.receivepack.
<VirtualHost *:8080>
    SetEnv GIT_PROJECT_ROOT /srv/repos
    SetEnv GIT_HTTP_EXPORT_ALL

    # Canonical git-http-backend mapping (from the git docs): route the smart
    # endpoints and the dumb fallbacks through the CGI with clean root URLs.
    ScriptAliasMatch \
        "(?x)^/(.*/(HEAD | \
                info/refs | \
                objects/(info/[^/]+ | \
                         [0-9a-f]{2}/[0-9a-f]{38} | \
                         pack/pack-[0-9a-f]{40}\.(pack|idx))| \
                git-(upload|receive)-pack))$" \
        /usr/lib/git-core/git-http-backend/$1

    <Directory "/usr/lib/git-core">
        Require all granted
    </Directory>
    <Directory "/srv/repos">
        Require all granted
    </Directory>
</VirtualHost>

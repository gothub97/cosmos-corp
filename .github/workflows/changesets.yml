name: Changesets

# On every push to main, Changesets either:
#   - opens / updates a "Version Packages" PR (when pending changesets exist), or
#   - runs the `release:tag` publish step (once that PR is merged and no
#     changesets remain), which pushes a `v<version>` tag and triggers the
#     release workflow.
on:
  push:
    branches: [main]

concurrency: changesets-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Version / tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the PAT so the tag pushed by the publish step triggers the
          # Release workflow (the default GITHUB_TOKEN cannot trigger workflows).
          token: ${{ secrets.RELEASE_PAT }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release PR or tag the release
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release:tag
          commit: "chore: version packages"
          title: "chore: version packages"
          # Let the Release workflow (tauri-action) own the GitHub Release so it
          # is a full release with the signed DMG attached, not a pre-release.
          createGithubReleases: false
        env:
          # PAT so the action can open the version PR without the repo-level
          # "Allow GitHub Actions to create and approve pull requests" setting.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
